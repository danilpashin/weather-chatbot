services:
  redis-master:
    image: redis:latest
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server
    networks:
      redis-net:
        ipv4_address: 172.55.0.10
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-replica:
    image: redis:latest
    container_name: redis-replica
    ports:
      - "6380:6379"
    command: redis-server --replicaof 172.55.0.10 6379
    networks:
      redis-net:
        ipv4_address: 172.55.0.11
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-1:
    image: redis:latest
    container_name: redis-sentinel-1
    ports:
      - "26379:26379"
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
             echo 'sentinel resolve-hostnames yes' >> sentinel.conf &&
             echo 'sentinel announce-hostnames yes' >> sentinel.conf &&
             echo 'sentinel monitor mymaster 172.55.0.10 6379 2' >> sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 10000' >> sentinel.conf &&
             redis-server sentinel.conf --sentinel"
    networks:
      - redis-net
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-2:
    image: redis:latest
    container_name: redis-sentinel-2
    ports:
      - "26380:26379"
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
             echo 'sentinel resolve-hostnames yes' >> sentinel.conf &&
             echo 'sentinel announce-hostnames yes' >> sentinel.conf &&
             echo 'sentinel monitor mymaster 172.55.0.10 6379 2' >> sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 10000' >> sentinel.conf &&
             redis-server sentinel.conf --sentinel"
    networks:
      - redis-net
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-3:
    image: redis:latest
    container_name: redis-sentinel-3
    ports:
      - "26381:26379"
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
             echo 'sentinel resolve-hostnames yes' >> sentinel.conf &&
             echo 'sentinel announce-hostnames yes' >> sentinel.conf &&
             echo 'sentinel monitor mymaster 172.55.0.10 6379 2' >> sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 10000' >> sentinel.conf &&
             redis-server sentinel.conf --sentinel"
    networks:
      - redis-net
    depends_on:
      redis-master:
        condition: service_healthy

  weather-api-service:
    container_name: weather-api-service
    build: 
      context: .
      dockerfile: Dockerfile.weather-api
    environment:
      - SERVICE_NAME=weather-api
      - API_HOST=${API_HOST}
      - API_PORT=${API_PORT}
      - REDIS_SENTINELS=${REDIS_SENTINELS}
      - REDIS_MASTER_NAME=${REDIS_MASTER_NAME}
    networks:
      - redis-net
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      redis-master:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs

  worker-service:
    container_name: worker-service
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - SERVICE_NAME=worker
      - API_TOKEN=${API_TOKEN}
      - REDIS_SENTINELS=${REDIS_SENTINELS}
      - REDIS_MASTER_NAME=${REDIS_MASTER_NAME}
    networks:
      - redis-net
    restart: always
    labels:
      - autoheal=true
    healthcheck:
      test: ["CMD-SHELL", "[ -n \"$(find /tmp/worker_status -mmin -1)\" ]"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      redis-master:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
      - worker_health:/tmp/worker_status

  tg-bot:
    container_name: tg-bot
    build: 
      context: .
      dockerfile: Dockerfile.bot
    environment:
      - SERVICE_NAME=bot
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_HOST=weather-api-service
      - API_PORT=${API_PORT}
      - REDIS_SENTINELS=${REDIS_SENTINELS}
      - REDIS_MASTER_NAME=${REDIS_MASTER_NAME}
    networks:
      - redis-net
    depends_on:
      weather-api-service:
        condition: service_started
      worker-service:
        condition: service_started
    volumes:
      - app-logs:/app/logs

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal-monitor
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - app-logs:/var/log/app
      - ./promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - loki

volumes:
  app-logs:
  worker_health:

networks:
  redis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.55.0.0/16