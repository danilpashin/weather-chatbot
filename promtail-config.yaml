server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: python-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: chatbot
          env: production
          __path__: /var/log/app/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            trace_id: trace_id
            user_id: user_id
      - labels:
          level:
          service:
          trace_id:
          user_id: