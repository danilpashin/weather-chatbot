name: CI Quality Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Run Ruff Check
      uses: astral-sh/ruff-action@v3
      with:
        args: "check"

    - name: Run Ruff Format
      uses: astral-sh/ruff-action@v3
      with:
        args: "format --check"